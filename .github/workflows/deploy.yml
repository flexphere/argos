name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行で deploy が衝突しないよう直列化。in-flight な deploy は止めない。
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # husky の prepare スクリプトを CI でスキップ (git hook は CI に不要)
      HUSKY: "0"
      # GitHub Pages 上は `<user>.github.io/argos/` で配信されるため basePath を付ける
      NEXT_PUBLIC_BASE_PATH: /argos
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      # Next.js が出力する `_next/` を GitHub Pages の Jekyll パイプラインが
      # 弾かないよう .nojekyll を置く
      - run: touch out/.nojekyll

      - uses: actions/configure-pages@v5
        with:
          # Pages が repo 設定で未有効でもワークフローから自動有効化する
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
